name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Module smoke checks
        run: |
          nvim --headless -u NONE -i NONE \
            "+set shada=\"\"" \
            "+set rtp+=${GITHUB_WORKSPACE}" \
            "+lua require('viewim').setup({})" \
            "+lua require('viewim.cursor')" \
            "+lua require('viewim.preview')" \
            "+lua require('viewim.health')" \
            "+qa!"
